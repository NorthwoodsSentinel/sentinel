name = "sentinel"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Durable Objects — the Sentinel Agent brain
[durable_objects]
bindings = [
  { name = "SENTINEL_AGENT", class_name = "SentinelAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SentinelAgent"]

# R2 — "Dawn of Time" telemetry storage
[[r2_buckets]]
binding = "TELEMETRY_R2"
bucket_name = "sentinel-telemetry"

# D1 — Baseline state and anomaly index
# Create with: wrangler d1 create sentinel-baselines
# Then paste the database_id below
[[d1_databases]]
binding = "BASELINE_D1"
database_name = "sentinel-baselines"
database_id = ""  # YOUR_D1_DATABASE_ID

# Secrets (set via wrangler secret put, never in this file):
#   ANTHROPIC_API_KEY — for Tier 3 narrative generation

# Environment variables
[vars]
ENVIRONMENT = "development"
